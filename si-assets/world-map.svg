<?xml version="1.0" encoding="UTF-8"?>
<!--
  Simplified world map for the WE LEAD section's global communities block.
  viewBox: 1000x500 (equirectangular). All continents render in
  currentColor so the host page can recolor via CSS (we use a faint
  white-purple in dao.html). Optional ocean is transparent so the
  underlying page background shows through.

  TODO: swap with the brand-specified world map PNG when available —
  replace the <img src> in dao.html's .dao-map-canvas block.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round" stroke-linecap="round" preserveAspectRatio="xMidYMid slice">
  <!-- North America (mainland) -->
  <path d="M70 110 L110 95 L160 92 L210 88 L260 95 L300 110 L330 130 L325 165 L295 195 L260 215 L235 245 L210 265 L180 275 L150 268 L120 250 L90 220 L70 185 L60 150 Z"/>
  <!-- Greenland -->
  <path d="M310 70 L335 65 L355 75 L360 95 L350 115 L325 118 L310 100 Z"/>
  <!-- Canada Arctic islands -->
  <path d="M165 78 L195 75 L220 80 L215 95 L185 92 L160 88 Z"/>
  <!-- Central America -->
  <path d="M200 270 L225 270 L245 280 L260 295 L255 310 L235 308 L215 295 L205 282 Z"/>
  <!-- Caribbean -->
  <ellipse cx="265" cy="280" rx="14" ry="5"/>
  <ellipse cx="285" cy="285" rx="6" ry="3"/>

  <!-- South America -->
  <path d="M255 310 L290 305 L315 320 L325 350 L320 390 L305 420 L290 445 L275 445 L260 420 L250 385 L245 350 Z"/>

  <!-- Europe (continental) -->
