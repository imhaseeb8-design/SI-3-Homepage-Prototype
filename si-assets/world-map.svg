  <!-- Asia (mainland) -->
  <path d="M555 105 L620 92 L685 88 L750 90 L800 100 L835 115 L850 140 L845 170 L820 195 L780 215 L735 225 L685 220 L640 210 L605 195 L575 175 L562 150 L555 130 Z"/>
