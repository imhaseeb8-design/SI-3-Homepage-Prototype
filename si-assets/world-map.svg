  <ellipse cx="775" cy="288" rx="22" ry="8"/>
  <ellipse cx="810" cy="295" rx="14" ry="5"/>
  <ellipse cx="828" cy="282" rx="7" ry="4"/>
  <ellipse cx="800" cy="270" rx="9" ry="4"/>
